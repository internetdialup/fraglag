name: PLTRF Check


# Preventative Long-Term Repo Fragmentation check.
# Logic over liturgy: this is the file Bamboo.md and ctx-rules.md cite as the
# enforcer. It performs five real, failable checks on every push and PR.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pltrf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No stale package name (fraglog)
        run: |
          # The orientation log is the historical record and may reference the
          # old name when documenting the rename; exclude it from the scan.
          hits=$(grep -rn --include='*.md' --include='*.py' 'fraglog' . \
                 | grep -v 'docs/ctx-orientation.md' || true)
          if [ -n "$hits" ]; then
            echo "$hits"
            echo "::error::Found stale 'fraglog' references. Package is 'fraglag'."
            exit 1
          fi
          echo "OK: no live 'fraglog' references."

      - name: Single orientation log (One Home)
        run: |
          count=$(find . -name 'ctx-orientation.md' -not -path './.git/*' | wc -l)
          if [ "$count" -ne 1 ]; then
            echo "::error::Expected exactly one ctx-orientation.md, found $count."
            find . -name 'ctx-orientation.md' -not -path './.git/*'
            exit 1
          fi
          echo "OK: exactly one orientation log."

      - name: Map references resolve
        run: |
          fail=0
          for p in fraglag/__init__.py fraglag/cli.py fraglag/parser.py \
                   fraglag/patterns.py demo.py examples/match.txt \
                   docs/ctx-orientation.md docs/repo-organization.md; do
            if [ ! -e "$p" ]; then echo "::error::Map cites missing path: $p"; fail=1; fi
          done
          exit $fail

      - name: Cited CI enforcer exists (self-check)
        run: |
          # Canon (Bamboo.md, repo-organization.md) names this workflow as the
          # enforcer. If that citation drifts from where the file actually lives,
          # the whole check silently stops running. Assert the cited path exists.
          cited='.github/workflows/pltrf-check.yml'
          if grep -rq "$cited" Bamboo.md docs/repo-organization.md && [ ! -f "$cited" ]; then
            echo "::error::Canon cites $cited but it is not at that path."
            exit 1
          fi
          echo "OK: cited CI enforcer resolves."
          - name: Knobs in descending date order
        run: |
          python3 - <<'PY'
          import re, sys
          from datetime import datetime
          text = open("docs/ctx-orientation.md", encoding="utf-8").read()
          headings = re.findall(r'^##\s+Knob:.*$', text, flags=re.MULTILINE)
          dates = []
          for h in headings:
              raw = h.rsplit("—", 1)[-1].strip()
              try:
                  dates.append((datetime.strptime(raw, "%A, %B %d, %Y"), h.strip()))
              except ValueError:
                  print(f"::error::Unparseable Knob date in heading: {h}"); sys.exit(1)
          if not dates:
              print("::error::No Knob headings found."); sys.exit(1)
          bad = False
          for (dp, hp), (dc, hc) in zip(dates, dates[1:]):
              if dc > dp:
                  print(f"::error::Knob out of order: '{hc}' ({dc.date()}) below '{hp}' ({dp.date()}).")
                  bad = True
          if bad:
              sys.exit(1)
          print(f"OK: {len(dates)} Knobs in descending order.")
          PY